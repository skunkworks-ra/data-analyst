name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.1
        with:
          pixi-version: v0.46.0
          frozen: true
          cache: true

      - name: Lint and format check
        run: pixi run check

  test-unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.1
        with:
          pixi-version: v0.46.0
          frozen: true
          cache: true

      - name: Install casatools and casatasks
        run: pixi run pip install casatools casatasks

      - name: Run unit tests
        run: pixi run test-unit
